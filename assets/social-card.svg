<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Markout social preview card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0969da"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="windowShadow" x="-15%" y="-20%" width="130%" height="145%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0969da" flood-opacity="0.16"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="526" y="92" width="584" height="358" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="132" cy="96" r="215" fill="#dbeafe" opacity="0.7"/>
  <circle cx="1070" cy="544" r="260" fill="#ccfbf1" opacity="0.55"/>
  <rect x="54" y="54" width="1092" height="522" rx="34" fill="#ffffff" opacity="0.78" stroke="#d8e2ef"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
    <g transform="translate(104 118)">
      <rect width="76" height="76" rx="19" fill="url(#accent)" filter="url(#softShadow)"/>
      <path d="M22 54 V22 h8 l8 15 8 -15 h8 v32 h-8 V36 l-7 13 h-3 l-7 -13 v18z" fill="#ffffff"/>
    </g>

    <text x="104" y="253" font-size="72" font-weight="800" fill="#111827">Markout</text>
    <rect x="106" y="273" width="132" height="7" rx="4" fill="url(#accent)"/>
    <text x="104" y="326" font-size="30" font-weight="650" fill="#243244">Native Markdown editor</text>
    <text x="104" y="363" font-size="30" font-weight="650" fill="#243244">for macOS.</text>
    <text x="104" y="402" font-size="22" font-weight="500" fill="#52606f">Live preview, math, diagrams,</text>
    <text x="104" y="432" font-size="22" font-weight="500" fill="#52606f">export, and offline rendering.</text>

    <g font-size="20" font-weight="650">
      <rect x="104" y="472" width="112" height="42" rx="21" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="160" y="499" text-anchor="middle" fill="#1f2937">Offline</text>
      <rect x="230" y="472" width="151" height="42" rx="21" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="306" y="499" text-anchor="middle" fill="#1f2937">Live Preview</text>
      <rect x="104" y="528" width="159" height="42" rx="21" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="184" y="555" text-anchor="middle" fill="#1f2937">Apple Silicon</text>
    </g>
  </g>

  <g filter="url(#windowShadow)">
    <rect x="526" y="92" width="584" height="358" rx="22" fill="#111827"/>
    <image href="screenshot.png" x="526" y="92" width="584" height="358" preserveAspectRatio="xMidYMid slice" clip-path="url(#windowClip)"/>
    <rect x="526" y="92" width="584" height="358" rx="22" fill="none" stroke="#263244" stroke-width="2"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="526" y="494" width="526" height="62" rx="22" fill="#0f172a" opacity="0.96"/>
    <text x="558" y="533" font-size="22" font-weight="700" fill="#f8fafc">Built with SwiftUI + TextKit + WKWebView</text>
  </g>
</svg>
