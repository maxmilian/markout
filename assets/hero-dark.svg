<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" width="1280" height="500" role="img" aria-label="Markout — a modern native macOS Markdown editor">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f81f7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2f81f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#2f81f7" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1280" height="500" rx="20" fill="#0d1117"/>
  <circle cx="250" cy="150" r="380" fill="url(#glow)"/>

  <!-- Left: wordmark + tagline + badges -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="72" y="176" font-size="92" font-weight="800" fill="#e6edf3" letter-spacing="-2">Markout</text>
    <rect x="74" y="196" width="132" height="6" rx="3" fill="#2f81f7"/>
    <text x="74" y="252" font-size="27" font-weight="500" fill="#8b949e">A modern, native macOS Markdown editor.</text>
    <text x="74" y="288" font-size="27" font-weight="500" fill="#8b949e">Built with SwiftUI for Apple Silicon.</text>

    <!-- badges -->
    <g font-size="18" font-weight="600">
      <rect x="74" y="322" width="127" height="34" rx="17" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text x="138" y="344" fill="#e6edf3" text-anchor="middle">MIT License</text>
      <rect x="213" y="322" width="109" height="34" rx="17" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text x="268" y="344" fill="#e6edf3" text-anchor="middle">macOS 14+</text>
      <rect x="334" y="322" width="90" height="34" rx="17" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text x="379" y="344" fill="#e6edf3" text-anchor="middle">SwiftUI</text>
      <rect x="436" y="322" width="109" height="34" rx="17" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text x="491" y="344" fill="#e6edf3" text-anchor="middle">cmark-gfm</text>
    </g>
  </g>

  <!-- Right: macOS window with split editor | preview -->
  <g filter="url(#shadow)">
    <rect x="612" y="70" width="604" height="360" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <!-- title bar -->
    <path d="M612 84 a14 14 0 0 1 14 -14 h576 a14 14 0 0 1 14 14 v24 h-604 z" fill="#161b22"/>
    <line x1="612" y1="108" x2="1216" y2="108" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="634" cy="89" r="6" fill="#ff5f57"/>
    <circle cx="654" cy="89" r="6" fill="#febc2e"/>
    <circle cx="674" cy="89" r="6" fill="#28c840"/>
    <text x="914" y="94" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">README.md</text>

    <!-- split divider -->
    <line x1="914" y1="108" x2="914" y2="430" stroke="#30363d" stroke-width="1.5"/>

    <!-- editor pane (monospace, syntax colored) -->
    <g font-family="'SF Mono', ui-monospace, Menlo, 'Cascadia Code', Consolas, monospace" font-size="17">
      <text x="636" y="146"><tspan fill="#2f81f7" font-weight="700"># Markout</tspan></text>
      <text x="636" y="180" fill="#e6edf3"><tspan fill="#a371f7">**</tspan>native<tspan fill="#a371f7">**</tspan> and <tspan fill="#a371f7">*</tspan>fast<tspan fill="#a371f7">*</tspan></text>
      <text x="636" y="214" fill="#e6edf3"><tspan fill="#3fb950">- [x]</tspan> Apple Silicon</text>
      <text x="636" y="248" fill="#e6edf3"><tspan fill="#3fb950">- [x]</tspan> Live preview</text>
      <text x="636" y="282" fill="#a371f7">```swift</text>
      <text x="636" y="312" fill="#e6edf3"><tspan fill="#2f81f7">let</tspan> md = <tspan fill="#3fb950">"# Hi"</tspan></text>
      <text x="636" y="342" fill="#a371f7">```</text>
    </g>

    <!-- preview pane (rendered) -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
      <text x="936" y="148" font-size="26" font-weight="800" fill="#e6edf3">Markout</text>
      <line x1="936" y1="160" x2="1192" y2="160" stroke="#30363d" stroke-width="1.5"/>
      <text x="936" y="192" font-size="16" fill="#e6edf3"><tspan font-weight="800">native</tspan> and <tspan font-style="italic">fast</tspan></text>
      <g font-size="15" fill="#e6edf3">
        <rect x="936" y="212" width="13" height="13" rx="3" fill="#3fb950"/>
        <path d="M939 219 l2.5 2.5 l4 -5" stroke="#0d1117" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="958" y="224">Apple Silicon</text>
        <rect x="936" y="236" width="13" height="13" rx="3" fill="#3fb950"/>
        <path d="M939 243 l2.5 2.5 l4 -5" stroke="#0d1117" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="958" y="248">Live preview</text>
      </g>
      <rect x="936" y="268" width="256" height="74" rx="8" fill="#161b22"/>
      <text x="952" y="296" font-family="'SF Mono', ui-monospace, Menlo, 'Cascadia Code', Consolas, monospace" font-size="14"><tspan fill="#2f81f7">let</tspan> <tspan fill="#e6edf3">md</tspan> <tspan fill="#e6edf3">=</tspan> <tspan fill="#3fb950">"# Hi"</tspan></text>
    </g>
  </g>
</svg>
